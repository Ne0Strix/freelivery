# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
    angular-dev:
        build:
            context: ./client
            dockerfile: Dockerfile.dev
        ports:
            - '4200:4200'
        volumes:
            - ./client:/app
            - /app/node_modules
        depends_on:
            db:
                condition: service_healthy

    node-backend-dev:
        build:
            context: ./server
            dockerfile: Dockerfile.dev
        environment:
            - SERVER_PORT=${SERVER_PORT}
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_USER=${POSTGRES_USER}
            - DB_PORT=${DB_PORT}
        ports:
            - '${SERVER_PORT}:3000'
            - '9229:9229'
        volumes:
            - ./server:/usr/src/app
            - server_node_modules:/usr/src/app/node_modules
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres
        restart: always
        # Postgres 18+ expects a single mount at /var/lib/postgresql so the
        # server can store data under versioned subdirectories. Mounting at
        # `/var/lib/postgresql` prevents the "unused mount/volume" layout
        # detection that causes the container to exit.
        volumes:
            - freelivery:/var/lib/postgresql
            - ./db/init-scripts:/docker-entrypoint-initdb.d
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_USER=${POSTGRES_USER}
        ports:
            - '${DB_PORT}:5432'
        healthcheck:
            test:
                [
                    'CMD',
                    'pg_isready',
                    '-U',
                    '${POSTGRES_USER}',
                    '-d',
                    '${POSTGRES_DB}',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
volumes:
    freelivery:
    server_node_modules:
