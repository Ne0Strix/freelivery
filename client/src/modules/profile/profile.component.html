<div class="profile-container">
    @if (loading()) {
        <p>Loading...</p>
    } @else {
        <h1>Profile Settings</h1>

        <!-- Personal Information -->
        <section class="profile-section">
            <h2>Personal Information</h2>
            <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input
                            id="email"
                            type="email"
                            formControlName="email"
                        />
                    </div>
                    <div class="form-group">
                        <label for="salutation">Salutation</label>
                        <select id="salutation" formControlName="salutation">
                            <option value="">-- Select --</option>
                            <option value="Mr.">Mr.</option>
                            <option value="Ms.">Ms.</option>
                            <option value="Mrs.">Mrs.</option>
                            <option value="Dr.">Dr.</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input
                            id="firstName"
                            type="text"
                            formControlName="firstName"
                        />
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input
                            id="lastName"
                            type="text"
                            formControlName="lastName"
                        />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input
                            id="phoneNumber"
                            type="tel"
                            formControlName="phoneNumber"
                        />
                    </div>
                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth</label>
                        <input
                            id="dateOfBirth"
                            type="date"
                            formControlName="dateOfBirth"
                        />
                    </div>
                </div>

                <button type="submit" class="btn-primary">Save Profile</button>
            </form>
        </section>

        <!-- Change Password -->
        <section class="profile-section">
            <h2>Change Password</h2>
            <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
                <div class="form-group">
                    <label for="currentPassword">Current Password *</label>
                    <input
                        id="currentPassword"
                        type="password"
                        formControlName="currentPassword"
                    />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="newPassword">New Password *</label>
                        <input
                            id="newPassword"
                            type="password"
                            formControlName="newPassword"
                        />
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <input
                            id="confirmPassword"
                            type="password"
                            formControlName="confirmPassword"
                        />
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Change Password
                </button>
            </form>
        </section>

        <!-- Restaurant Details (for restaurant owners only) -->
        @if (isRestaurantOwner && restaurant()) {
            <section class="profile-section">
                <h2>Restaurant Details</h2>
                <form
                    [formGroup]="restaurantForm"
                    (ngSubmit)="saveRestaurant()"
                >
                    <div class="form-group">
                        <label for="restaurantName">Restaurant Name *</label>
                        <input
                            id="restaurantName"
                            type="text"
                            formControlName="name"
                        />
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea
                            id="description"
                            formControlName="description"
                            rows="3"
                        ></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="contactEmail">Contact Email *</label>
                            <input
                                id="contactEmail"
                                type="email"
                                formControlName="contactEmail"
                            />
                        </div>
                        <div class="form-group">
                            <label for="contactPhone">Contact Phone *</label>
                            <input
                                id="contactPhone"
                                type="tel"
                                formControlName="contactPhone"
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="maxDeliveryDistance"
                            >Max Delivery Distance (grid steps) *</label
                        >
                        <input
                            id="maxDeliveryDistance"
                            type="number"
                            formControlName="maxDeliveryDistance"
                            min="1"
                            max="20"
                        />
                        <p class="form-hint">
                            Maximum Manhattan distance (1-20) you can deliver
                            to. Each step = 5 min delivery time.
                        </p>
                    </div>

                    <button type="submit" class="btn-primary">
                        Save Restaurant
                    </button>
                </form>
            </section>
        }
    }
</div>
