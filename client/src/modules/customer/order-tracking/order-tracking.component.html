<div class="order-tracking">
    <mat-card>
        <mat-card-header>
            <mat-card-title> Order #{{ orderId }} </mat-card-title>
            <mat-card-subtitle>
                <mat-chip color="primary">
                    Status: {{ currentStatus }}
                </mat-chip>
            </mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <div class="delivery-info">
                <div class="info-row">
                    <mat-icon>schedule</mat-icon>
                    <div>
                        <h3>Estimated Delivery</h3>
                        <p>{{ deliveryTime }} minutes</p>
                    </div>
                </div>
            </div>

            <div class="progress-tracker">
                <div class="progress">
                    <div class="progress-line"></div>

                    <div class="progress-step" [class.active]="currentStep(1)">
                        <div class="step-circle">1</div>
                        <span class="step-label">Ordered</span>
                    </div>

                    <div class="progress-step" [class.active]="currentStep(2)">
                        <div class="step-circle">2</div>
                        <span class="step-label"> Preparing</span>
                    </div>

                    <div class="progress-step" [class.active]="currentStep(3)">
                        <div class="step-circle">3</div>
                        <span class="step-label"> Ready</span>
                    </div>

                    <div class="progress-step" [class.active]="currentStep(4)">
                        <div class="step-circle">4</div>
                        <span class="step-label"> Delivered</span>
                    </div>
                </div>
            </div>

            <div class="order-items">
                <h3>Order Details</h3>
                <div class="items-list">
                    <div *ngFor="let item of sampleItems" class="item-row">
                        <div class="item-info">
                            <span class="item-name">{{ item.name }}</span>
                            <span class="item-quantity">
                                x {{ item.quantity }}</span
                            >
                        </div>
                        <span class="item-price"
                            >€
                            {{ (item.price * item.quantity).toFixed(2) }}</span
                        >
                    </div>
                </div>

                <div class="order-total">
                    <span> Total: </span>
                    <span class="total-amount"
                        >€ {{ totalPrice.toFixed(2) }}</span
                    >
                </div>
            </div>
        </mat-card-content>

        <mat-card-actions align="end">
            <button
                *ngIf="currentStatus !== 'delivered'"
                mat-flat-button
                color="primary"
                (click)="refreshStatus()"
                class="refresh"
            >
                <mat-icon> refresh </mat-icon> Update order status
            </button>
            <button
                *ngIf="currentStatus === 'delivered'"
                mat-flat-button
                color="accent"
                (click)="goToFeedback()"
                class="feedback"
            >
                <mat-icon> feedback </mat-icon> Rate our service by leaving a
                feedback
            </button>

            <button mat-stroked-button routerLink="/customer/home">
                Back to home page
            </button>
        </mat-card-actions>
    </mat-card>
</div>
