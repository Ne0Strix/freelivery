<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-header">
            <span class="brand-text">FreeLivery</span>
            <button
                type="button"
                class="mobile-menu-btn"
                (click)="toggleMenu()"
            >
                @if (menuOpen()) {
                    <i class="fa-solid fa-xmark"></i>
                } @else {
                    <i class="fa-solid fa-bars"></i>
                }
            </button>
        </div>

        <div class="navbar-menu" [class.menu-open]="menuOpen()">
            <div class="nav-links">
                @if (isCustomer()) {
                    <a
                        routerLink="/customer"
                        routerLinkActive="nav-link-active"
                        [routerLinkActiveOptions]="{ exact: true }"
                        class="nav-link"
                        (click)="closeMenu()"
                    >
                        Customer
                    </a>
                }
                @if (isRestaurantOwner()) {
                    <a
                        routerLink="/restaurant"
                        routerLinkActive="nav-link-active"
                        class="nav-link"
                        (click)="closeMenu()"
                    >
                        Restaurant
                    </a>
                }
                @if (isAdmin()) {
                    <a
                        routerLink="/site-manager"
                        routerLinkActive="nav-link-active"
                        class="nav-link"
                        (click)="closeMenu()"
                    >
                        Manager Dashboard
                    </a>
                }
            </div>

            <div class="nav-actions">
                @if (!isLoggedIn()) {
                    <button
                        type="button"
                        class="btn-signin nav-action"
                        routerLink="/login"
                        (click)="closeMenu()"
                    >
                        Sign In
                    </button>
                } @else {
                    <a
                        routerLink="/profile"
                        class="profile-link nav-action"
                        title="Profile"
                        (click)="closeMenu()"
                    >
                        <i class="fa-regular fa-user"></i>
                        <span class="profile-text">Profile</span>
                    </a>
                    <button
                        type="button"
                        class="btn-signout nav-action"
                        (click)="signOut(); closeMenu()"
                    >
                        Sign Out
                    </button>
                }
            </div>
        </div>
    </div>
</nav>
