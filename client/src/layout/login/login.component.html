<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
        <form [formGroup]="form" class="space-y-6">
            <fieldset class="border-0 p-0 m-0">
                <legend class="text-2xl font-semibold mb-4">Login</legend>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700"
                        >Email:</label
                    >
                    <input
                        name="email"
                        formControlName="email"
                        class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    />
                </div>

                <div class="space-y-2 mt-4">
                    <label class="block text-sm font-medium text-gray-700"
                        >Password:</label
                    >
                    <input
                        name="password"
                        formControlName="password"
                        type="password"
                        class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    />
                </div>
            </fieldset>

            <div>
                <button
                    type="button"
                    (click)="login()"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-md shadow"
                >
                    Login
                </button>
            </div>

            <div class="text-center text-sm text-gray-600">
                Don't have an account?
                <a routerLink="/signup" class="text-indigo-600 hover:underline"
                    >Sign up</a
                >
            </div>
        </form>
    </div>
</div>
